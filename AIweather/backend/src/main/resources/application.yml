
server:
  port: 8080

spring:
  application:
    name: ai-weather

  datasource:
    url: jdbc:h2:mem:weatherdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

weather:
  open-meteo:
    geo-base-url: https://geocoding-api.open-meteo.com
    weather-base-url: https://api.open-meteo.com

  deepseek:
    api-url: https://api.deepseek.com/chat/completions
    api-key: ${DEEPSEEK_API_KEY:your_deepseek_api_key_here}
    model: deepseek-chat

logging:
  level:
    com.ai.weather: DEBUG
